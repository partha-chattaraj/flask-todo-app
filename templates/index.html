<!DOCTYPE html>
<html>
<head>
    <title>My ToDo</title>
</head>
<body>

<h2>My Tasks</h2>

<form method="POST">
    <input type="text" name="task" required>
    <button type="submit">Add</button>
</form>

<ul>
    {% for task in tasks %}
    <li>
        {{ task }}
        <a href="/delete/{{ loop.index0 }}">Delete</a>
    </li>
    {% endfor %}
</ul>

</body>
</html>
